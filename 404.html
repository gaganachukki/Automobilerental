<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Automobile Rental Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/404.css">
</head>
<body>
    
        
    <main style="height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background-color: var(--bg-light-beige);">
        <section class="error-page-container">
            <div class="error-code animate-in delay-1">404!</div>
            <h1 class="error-title animate-in delay-2">Looks like you've taken a wrong turn.</h1>
            <p class="error-message animate-in delay-3">We can't seem to find the page you're looking for. The route might have changed, or the page no longer exists.</p>
            <div class="error-actions animate-in delay-4">
                <a href="index.html" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Back to Home
                </a>
                <a href="#" onclick="history.back(); return false;" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
                    Go Back
                </a>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
    
</body>
</html>
